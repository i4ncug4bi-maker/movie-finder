<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Searcher</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }
        input {
            width: 300px;
            padding: 10px;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }
        .movie {
            margin-top: 40px;
        }
    </style>
</head>
<body>

<h1>🍿 Movie Searcher</h1>

<form action="/search" method="get">
    <input type="text" name="title" placeholder="Enter movie name..." required>
    <button type="submit">Search</button>
</form>

{% if movie %}
<div class="movie">
    <h2>{{ movie.title }}</h2>
    <p>Release date: {{ movie.release_date }}</p>
    <p>⭐ Rating: {{ movie.vote_average }}/10</p>
    <p>{{ movie.overview }}</p>

    {% if trailer %}
    <iframe width="560" height="315" src="https://www.youtube.com/embed/{{ trailer }}" frameborder="0" allowfullscreen></iframe>
    {% endif %}
</div>
{% endif %}

</body>
</html>
